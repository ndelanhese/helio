name: release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Verify trusted annotated release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "$(git cat-file -t "refs/tags/$tag")" == tag ]]
          local_commit="$(git rev-parse "refs/tags/$tag^{}")"
          [[ "$local_commit" == "$GITHUB_SHA" ]]
          read -r remote_commit remote_ref < <(git ls-remote --tags origin "refs/tags/$tag^{}")
          [[ "$remote_ref" == "refs/tags/$tag^{}" ]]
          [[ "$remote_commit" == "$GITHUB_SHA" ]]
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Backend tests
        run: go test -race ./...
      - name: Backend vet
        run: go vet ./...
      - name: Install locked frontend dependencies
        working-directory: web
        run: npm ci
      - name: Frontend tests
        working-directory: web
        run: npm test -- --run
      - name: Frontend typecheck
        working-directory: web
        run: npm run typecheck
      - name: Frontend lint
        working-directory: web
        run: npm run lint
      - name: Frontend build
        working-directory: web
        run: npm run build
      - name: Install browser dependencies
        working-directory: web
        run: npx playwright install --with-deps chromium webkit
      - name: Browser acceptance tests
        run: make test-e2e
      - name: Container build and smoke test
        run: HELIO_IMAGE=helio:release-verify IMAGE=helio:release-verify make smoke

  release:
    needs: verify
    environment: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.preflight.outputs.digest || steps.build.outputs.digest }}
    env:
      IMAGE_NAME: ghcr.io/ndelanhese/helio
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Check immutable release state
        id: preflight
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release-preflight.sh
      - name: Verify existing signature and provenance
        if: steps.preflight.outputs.state == 'existing'
        env:
          VERIFIED_DIGEST: ${{ steps.preflight.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          identity="https://github.com/ndelanhese/helio/.github/workflows/release.yml@refs/tags/$GITHUB_REF_NAME"
          cosign verify --certificate-identity "$identity" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" "${IMAGE_NAME}@${VERIFIED_DIGEST}"
          cosign verify-attestation --type https://slsa.dev/provenance/v1 --certificate-identity "$identity" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" "${IMAGE_NAME}@${VERIFIED_DIGEST}"
      - name: Publish immutable multi-architecture image
        if: steps.preflight.outputs.state == 'new'
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          labels: org.opencontainers.image.version=${{ github.ref_name }}
          sbom: true
          provenance: mode=max
      - name: Attest published provenance
        if: steps.preflight.outputs.state == 'new'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Sign immutable image digest
        if: steps.preflight.outputs.state == 'new'
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"
      - name: Create immutable GitHub Release
        if: steps.preflight.outputs.state == 'new'
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/helio-release-notes.md"
          cp CHANGELOG.md "$notes"
          printf '\nHelio-Image-Digest: %s\n' "$IMAGE_DIGEST" >> "$notes"
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --title "Helio $GITHUB_REF_NAME" --notes-file "$notes"
      - name: Finalize eligible stable aliases
        env:
          GH_TOKEN: ${{ github.token }}
          IMMUTABLE_DIGEST: ${{ steps.preflight.outputs.digest || steps.build.outputs.digest }}
        run: scripts/finalize-release-aliases.sh
      - name: Report immutable image digest
        env:
          EXISTING_DIGEST: ${{ steps.preflight.outputs.digest }}
          PUBLISHED_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          digest="${EXISTING_DIGEST:-$PUBLISHED_DIGEST}"
          printf 'Immutable image digest: **%s**\n' "$digest" >> "$GITHUB_STEP_SUMMARY"
