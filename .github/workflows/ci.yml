name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify workflow contracts
        run: |
          ruby scripts/gitguardian_config_test.rb
          ruby scripts/workflow_contract_test.rb
          ruby scripts/release_preflight_test.rb
          ruby scripts/finalize_release_aliases_test.rb
          ruby scripts/validate_e2e_artifacts_test.rb
      - name: Test with race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  e2e:
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --ipc=host
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install locked dependencies
        run: npm --prefix web ci
      - name: Trust only the checked-out workspace for Go VCS metadata
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Run browser acceptance tests
        run: npm --prefix web run test:e2e
      - name: Structurally validate failed browser traces
        id: artifact-validator
        if: failure()
        run: scripts/validate-e2e-artifacts.sh web/test-results
      - name: Upload privacy-scanned failure artifacts
        if: failure() && steps.artifact-validator.outputs.has_artifacts == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: web/test-results/**/trace.zip
          if-no-files-found: ignore
          retention-days: 7

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and smoke test
        run: HELIO_IMAGE=helio:ci IMAGE=helio:ci make smoke
