name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Remove credentials, logger serials, public IPs, and private energy data before submitting.
  - type: input
    id: version
    attributes:
      label: Helio version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Inverter and logger model
      placeholder: SOFAR 6KTLM-G3 with Solarman V5 logger
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets, serials, public IPs, and private data.
          required: true
        - label: I searched existing issues for duplicates.
          required: true

