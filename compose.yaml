services:
  helio:
    image: ${HELIO_IMAGE:-helio:local}
    build:
      context: .
    ports:
      - "8080:8080"
    env_file:
      - path: deploy/helio.env
        required: false
    volumes:
      - helio-data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  helio-data:
